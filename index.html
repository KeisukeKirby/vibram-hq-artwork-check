<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibram Brand Compliance Dashboard</title>
  <meta name="description" content="Vibram製品のブランド基準チェック・承認ダッシュボード" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <img src="logo.png" class="vibram-logo-img" alt="Vibram Logo" />
        <div class="header-divider"></div>
        <div class="header-title-block">
          <h1 class="header-title">Brand Compliance Dashboard</h1>
          <p class="header-subtitle">ブランド基準チェック・承認システム</p>
        </div>
      </div>
      <div class="header-actions">
        <div class="stats-pill" id="statsPill">
          <span class="stat-item">
            <span class="stat-dot dot-pending"></span>
            <span id="countPending">0</span> 確認待ち
          </span>
          <span class="stat-sep">|</span>
          <span class="stat-item">
            <span class="stat-dot dot-approved"></span>
            <span id="countApproved">0</span> 承認済
          </span>
          <span class="stat-sep">|</span>
          <span class="stat-item">
            <span class="stat-dot dot-rejected"></span>
            <span id="countRejected">0</span> 非承認
          </span>
        </div>
        <button class="btn btn-add" id="btnAddItem" onclick="addItem()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          新しいアイテムを追加
        </button>
      </div>
    </div>
  </header>

  <!-- Reviewer Selector -->
  <div class="reviewer-bar">
    <div class="reviewer-bar-inner">
      <div class="pdf-section">
        <button class="btn-pdf-modal" onclick="openPdfModal()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
          Brand Guideline
        </button>
      </div>
      <button class="btn-export" onclick="exportData()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        エクスポート
      </button>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-bar-inner">
      <span class="filter-label">ステータス：</span>
      <button class="filter-btn active" data-filter="pending" onclick="filterItems('pending', this)">確認待ち</button>
      <button class="filter-btn" data-filter="approved" onclick="filterItems('approved', this)">承認済</button>
      <button class="filter-btn" data-filter="rejected" onclick="filterItems('rejected', this)">非承認</button>

      <span class="filter-label" style="margin-left:16px;">店舗：</span>
      <button class="filter-cat-btn active" data-cat="BAREFOOT PARK" onclick="filterByCategory('BAREFOOT PARK', this)">BAREFOOT PARK</button>
      <button class="filter-cat-btn" data-cat="K VILLAGE" onclick="filterByCategory('K VILLAGE', this)">K VILLAGE</button>
      <button class="filter-cat-btn" data-cat="OTHERS" onclick="filterByCategory('OTHERS', this)">OTHERS</button>
      <div class="filter-search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" class="filter-search" placeholder="アイテムを検索..." oninput="searchItems(this.value)" />
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main">
    <div class="items-container" id="itemsContainer">
      <!-- Items will be injected here -->
    </div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">📋</div>
      <p class="empty-title">アイテムがありません</p>
      <p class="empty-sub">「新しいアイテムを追加」ボタンでチェックを開始してください</p>
    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <div class="lightbox-inner" onclick="event.stopPropagation()">
      <button class="lightbox-close" onclick="closeLightbox()">✕</button>
      <img class="lightbox-img" id="lightboxImg" src="" alt="Preview" />
      <p class="lightbox-caption" id="lightboxCaption"></p>
    </div>
  </div>

  <!-- PDF Modal -->
  <div id="pdfModal" class="lightbox" onclick="closePdfModal()">
    <div class="lightbox-content pdf-modal-content" onclick="event.stopPropagation()">
      <button class="lightbox-close" onclick="closePdfModal()">×</button>
      <h3 style="margin-top: 0; margin-bottom: 20px;">Brand Guideline</h3>
      <div class="pdf-modal-options">
        <div class="pdf-modal-slot">
          <a class="pdf-lang-btn has-pdf" href="pdf/brand_guide_en.pdf" target="_blank" style="text-decoration: none; display: flex;">EN</a>
        </div>
        <div class="pdf-modal-slot">
          <a class="pdf-lang-btn has-pdf" href="pdf/brand_guide_th.pdf" target="_blank" style="text-decoration: none; display: flex;">TH</a>
        </div>
        <div class="pdf-modal-slot">
          <a class="pdf-lang-btn has-pdf" href="pdf/brand_guide_jp.pdf" target="_blank" style="text-decoration: none; display: flex;">JP</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
